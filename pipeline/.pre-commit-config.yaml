# Run on every commit. Keeps the working tree clean without manual ruff/pytest invocations.
#
# Install once:  pre-commit install
# Run manually:  pre-commit run --all-files
# Skip for one commit: git commit --no-verify

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^tests/fixtures/
      - id: end-of-file-fixer
        exclude: ^tests/fixtures/
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=2048']  # PLY fixtures + the like
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy-strict
        name: mypy (strict, src/)
        entry: uv run mypy src/
        language: system
        pass_filenames: false
        stages: [pre-push]   # strict type-check on push — keeps the gate from drifting
      - id: pytest-fast
        name: pytest (fast unit tests)
        entry: uv run pytest -q --ignore=tests/test_e2e.py
        language: system
        pass_filenames: false
        stages: [pre-push]   # only on push; not on every commit (~3 s but still)
