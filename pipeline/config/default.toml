# auto-splat-pipeline — Default-Konfiguration
# User-Overrides via:
#   1. ~/.config/autosplat/config.toml (XDG-style)
#   2. --config <path> CLI-Flag
# Siehe docs/CONFIGURATION.md für alle Keys.

[paths]
captures_dir = "~/AutoSplat/captures"
watch_folder = "~/AutoSplat/inbox"
brush_binary = "~/AutoSplat/bin/brush"

[preprocess]
target_frames = 250
blur_threshold = 100.0          # Laplacian variance; lower = blurrier filtered out
min_frame_distance_sec = 0.2    # avoid duplicate frames
hdr_tonemap = true              # auto-detect HLG/PQ (e.g. DJI Osmo) and tone-map to SDR Rec.709
blur_rescue = true              # if blur_threshold leaves <3 frames, keep the sharpest instead of failing
blur_rescue_rel_factor = 0.6    # rescue keeps frames >= this fraction of the batch median

[colmap]
matcher = "sequential"          # "sequential" for video-derived frames; "exhaustive" for unordered
quality = "medium"              # presets: low | medium | high (affects feature count)
single_camera = true            # all frames from one drone camera

[brush]
max_steps = 30000
resolution_cap = 1600
sh_degree = 3
densify_until_iter = 15000
extra_args = []                 # passthrough for advanced users
# v1.5.0 — Train-till-Plateau (opt-in). When enabled, Brush is launched with
# eval-flags that hold out 1/plateau_eval_split_every frames and render them
# every plateau_eval_every steps. A PlateauMonitor thread computes mean PSNR
# from the rendered evals and SIGTERMs Brush when plateau_patience consecutive
# Δ-PSNR values fall below plateau_min_delta_psnr (after plateau_min_steps).
plateau_enabled = false
plateau_eval_split_every = 10   # every 10th frame held out (~10 %)
plateau_eval_every = 1000       # also drives Brush --export-every for safe SIGTERM
plateau_min_steps = 5000        # ≥ this many steps before plateau-check engages
plateau_patience = 3            # M consecutive flat-Δ evals → stop
plateau_min_delta_psnr = 0.05   # ε in dB — Δ below this counts as flat

[export]
formats = ["ply"]               # future: ["ply", "splat", "spz"]
copy_to_outputs = true
outputs_dir = "~/AutoSplat/outputs"

[viewer]
auto_open = true
local_http_port = 8765
# v1.4.4: default to supersplat-local. With the dist built, autosplat starts
# both servers locally and opens the editor — no Mixed-Content blocking from
# the HTTPS remote editor refusing to fetch the HTTP localhost PLY. If the
# dist isn't built, the viewer prints a hint to run setup_supersplat.sh.
target = "supersplat-local"     # supersplat-local | supersplat | playcanvas | none
supersplat_local_port = 3000
supersplat_dist_path = "target/supersplat/dist"
notify_on_complete = false       # macOS Notification after training. Opt-in.

[obsidian]
enabled = false                 # opt-in
vault_path = ""                 # absolute path to your Obsidian vault. Empty = unset; doctor warns.
captures_subdir = "Captures"    # folder inside the vault. Adjust to your vault's convention.
attach_ply = false              # PLY-Files sind groß, default off
filename_pattern = "{capture_date} {video_stem}.md"
default_tags = ["3d-memory", "gaussian-splat", "auto-splat"]
frontmatter_type = "capture"    # Obsidian-Bases-compatible `type:` field; align with your _types/

[logging]
level = "INFO"
console = "rich"                # rich | plain
log_to_file = true

[quality_gate]
# Validation stage that runs after COLMAP and before Brush. Spec §11.3.
# Bails out with a structured failure rather than wasting 25-30 min of Brush
# compute on hopeless SfM output (see docs/PHASE-0-CALIBRATION.md, ice_bird).
enabled = true
min_camera_ratio = 0.5          # cameras_registered / frames_kept must be ≥ this
min_points = 5000               # COLMAP must produce ≥ this many sparse 3D points

[retry]
# Adaptive-retry policy for the watch-folder daemon. Applies to:
#   - captures that were `in_progress` when the daemon was killed (reason
#     "interrupted") — re-enqueued by recover_state()
#   - quality-gate failures — re-enqueued with a config override that swaps
#     `colmap.matcher` from sequential to exhaustive
enabled = true
max_retries = 3                 # max total attempts per capture (incl. first try)
# v1.4 — Auto-Bisection-Rescue. When the sequential→exhaustive swap still
# can't rescue a capture (retry_hint=None), the pipeline binary-subdivides
# the source video, probes each leaf clip with a cheap preprocess+SfM-only
# run, and combines the surviving leaves through the existing multi-video
# pipeline path. See docs/CAPTURE-GUIDE.md and rescue/ in the capture dir.
bisect_enabled = true                # disable for fast-fail in CI
bisect_min_clip_s = 60.0             # sub-clips shorter than this are not probed
bisect_max_depth = 3                 # max recursion depth (3 → ≤ 8 leaves per video)
bisect_probe_target_frames = 120     # preprocess.target_frames override for probes
                                      # (exhaustive scales as n²/2 — 250 → 31k matches,
                                      # 120 → 7k matches; ~4× faster per probe)
bisect_smart_split = false           # v1.4.1 — use OpenCV optical-flow to cut at the
                                      # strongest motion change (typically the rotation
                                      # event) instead of at midpoint. Opt-in.

[status]
# Status-file pruning. `completed` and `failed` lists are trimmed FIFO once they
# exceed this many entries — prevents state.json from growing unbounded over
# weeks of operation.
max_history = 50

[compress]
# Phase-5: optional compress stage. Runs after Export when enabled. Produces
# web-optimal splat formats next to the canonical PLY. Backend is
# `splat-transform` (PlayCanvas); auto-resolved via `npx` if not globally installed.
enabled = false
formats = ["sog"]          # list, can include multiple of: "sog", "spz", "ksplat"
quality = "medium"         # low | medium | high — controls SOG iterations + SH filter
