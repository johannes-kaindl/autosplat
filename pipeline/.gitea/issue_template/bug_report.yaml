name: Bug report
about: Something doesn't work as expected
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time. Please keep the report concrete — the
        easier it is to reproduce, the faster the fix.

        **Security-sensitive issues** do not belong here — see
        [`SECURITY.md`](https://codeberg.org/jkaindl/autosplat/src/branch/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A short, precise description of the problem.
      placeholder: COLMAP solves only 5/244 cameras on a drone video that visibly has good parallax.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Which command + input, ideally with stage-level output paths.
      placeholder: |
        1. autosplat process ~/inbox/max_strasse.MP4
        2. Capture dir created at ~/AutoSplat/captures/2026-05-27_max_strasse/
        3. Pipeline fails at COLMAP SfM with `< quality_min`
        4. pipeline.log tail: …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: Either successful SfM, or quality-gate-driven escalation to exhaustive matcher + bisection-rescue.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Which surface?
      options:
        - CLI (autosplat process / resume / rescue / add-video)
        - CLI (watch / status / doctor / version)
        - WebUI (FastAPI / HTMX)
        - SuperSplat local-viewer integration
        - Other / not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: "`autosplat version` or release tag"
      placeholder: v1.4.6
  - type: input
    id: hardware
    attributes:
      label: Hardware (Mac model + RAM)
      placeholder: M5 Pro, 32 GB RAM
  - type: input
    id: capture-info
    attributes:
      label: Capture (size, source, duration)
      placeholder: 5:35 drone .MP4, 4K30, ~1.1 GB
  - type: textarea
    id: logs
    attributes:
      label: pipeline.log tail
      description: Last 30–50 lines of the failing capture's pipeline.log.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I ran `autosplat doctor` and all preflight deps are present.
          required: true
        - label: I checked [existing issues](https://codeberg.org/jkaindl/autosplat/issues) for duplicates.
          required: true
        - label: This is not a security issue (otherwise → SECURITY.md).
          required: true
